apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: wordpress
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: redis-master.wordpress.svc.cluster.local:6379
  - name: actorStateStore
    value: "true"
---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
  namespace: wordpress
spec:
  type: pubsub.redis
  version: v1
  metadata:
  - name: redisHost
    value: redis-master.wordpress.svc.cluster.local:6379
