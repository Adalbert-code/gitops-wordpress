apiVersion: helm.crossplane.io/v1beta1
kind: Release
metadata:
  name: mariadb-staging
spec:
  providerConfigRef:
    name: default
  forProvider:
    chart:
      name: mariadb-staging
      repository: https://charts.bitnami.com/bitnami
      version: "20.2.1"
    namespace: wordpress
    values:
      image:
        tag: "latest"
      auth:
        rootPassword: rootpassword
        database: wordpress
        username: wordpress
        password: wordpresspassword
