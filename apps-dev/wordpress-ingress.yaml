apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress-dev-ingress
  namespace: wordpress-dev
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: wordpress-dev.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wordpress-dev
            port:
              number: 80
